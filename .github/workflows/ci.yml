name: Township CEO CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit

  test:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npx vitest run --reporter=verbose

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npm run build

  eval-gate:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - name: Check Spec Coverage
        run: |
          echo "Checking spec coverage..."
          if [ -d "specs" ]; then
            echo "Found $(find specs -name '*.feature' | wc -l) feature files"
            for f in specs/*.feature; do
              echo "  - $(basename $f)"
            done
          fi
      - name: Check Skill Structure
        run: |
          echo "Checking skill structure..."
          if [ -d ".agent/skills" ]; then
            for d in .agent/skills/*/; do
              if [ -f "$d/SKILL.md" ]; then
                echo "  ✅ $(basename $d)/SKILL.md"
              else
                echo "  ❌ $(basename $d) missing SKILL.md"
              fi
            done
          fi
